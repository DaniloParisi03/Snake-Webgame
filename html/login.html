<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="../css/login_style.css" type="text/css">
    <link rel="icon" type="image/x-icon" href="../images/login_icon.png">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../js/login_code.js"></script>
</head>
<body>
    <div class="grid">
        <div class="login_space">
            <form id="formLogin">
                <div class="rotating-text">
                    <p>
                        <span id="login" class="word log">Login</span>
                    </p>
                </div>
                <div class="input-box">
                    <input id="email" placeholder=" Email" name="email" type="email" autocomplete="email">
                </div>
                <div class="input-box">
                    <input id="myPass" placeholder=" Password" name="password" type="password" autocomplete="current-password">
                    <p class="showpass"><input type="checkbox" onclick="ShowPass()"> Show Password</p>
                </div>
                <div class="send">
                    <button type="submit">Send</button>
                </div>
            </form>   
        </div>
    </div>
    <div class="registration">
        <p> Don't have an account? <a href="signup.html" id="reg">Sign up!</a></p>
    </div>
</body>
</html>
