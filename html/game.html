<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="../css/game_style.css">

    <script type="module" src="../js/game_code.js"></script>
    <script type="module" src="../js/get_score.js"></script>
    <script type="module" src="../js/timer_code.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <link rel="icon" type="image/x-icon" href="../images/gamepad_icon.png">
</head>
<body>
    <div class="box div1">
        <p id="score">Score: 0</p>
        <p id="messaggioRecord">New Record!</p>
    </div>
    
    <div class="box div2">
        <div class="userData">
            <p id="usernameP">Username: </p>
            <p id="userscoreP">Best Score: </p>
        </div>    
        <div class="logoutData">
            <a id="logout" href="login.html">
                Logout
            </a>
        </div>
    </div>
    <!-- Game Screen Container -->
    <div class="div3">
        <canvas id="screen"></canvas>
    </div>
    <div class="box div4">
        <h1><time id="cronometro">00:00:00</time></h1>
    </div>
    <div class="box div5">
        <div>
            <a href="./home.html">Home</a>
            <button id="pauseButton"><i class="material-icons">pause_circle_outline</i></button>
            <button id="restartButton"><i class="material-icons">replay</i></button>
        </div>
    </div>

    <!-- Apple Sprite -->
    <img id="apple" alt="apple" class="img" src="../images/apple.png">
</body>
</html>
