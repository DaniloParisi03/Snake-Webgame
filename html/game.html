<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="../css/game_style.css">

    <script type="module" src="../js/game_code.js"></script>
    <script type="module" src="../js/get_score.js"></script>
    <script type="module" src="../js/timer_code.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <link rel="icon" type="image/x-icon" href="../images/gamepad_icon.png">
</head>
<body>
    <div class="box div1">
        <p id="score">Score: 0</p>
        <p id="messaggioRecord">New Record!</p>
    </div>
    
    <div class="box div2">
        <div class="userData">
            <p id="usernameP">Username: </p>
            <p id="userscoreP">Best Score: </p>
        </div>    
        <div class="logoutData">
            <a id="logout" href="login.html">
                Logout
            </a>
        </div>
    </div>
    <!-- Game Screen Container -->
    <div class="div3">
        <canvas id="screen"></canvas>
    </div>
    <div class="box div4">
        <h1><time id="cronometro">00:00:00</time></h1>
    </div>
    <div class="box div5">
        <div>
            <a href="./home.html">Home</a>
            <button id="pauseButton"><i class="material-icons">pause_circle_outline</i></button>
            <button id="restartButton"><i class="material-icons">replay</i></button>
        </div>
    </div>

    <!-- Snake and Apple Asset Sprites -->
    <img id="head r" alt="head r" class="img" src="../images/head_right.png">
    <img id="head l" alt="head l" class="img" src="../images/head_left.png">
    <img id="head u" alt="head u" class="img" src="../images/head_up.png">
    <img id="head d" alt="head d" class="img" src="../images/head_down.png">

    <img id="dead r" alt="dead r" class="img" src="../images/dead_right.png">
    <img id="dead l" alt="dead l" class="img" src="../images/dead_left.png">
    <img id="dead u" alt="dead u" class="img" src="../images/dead_up.png">
    <img id="dead d" alt="dead d" class="img" src="../images/dead_down.png">

    <img id="apple" alt="apple" class="img" src="../images/apple.png">

    <img id="tail r" alt="tail r" class="img" src="../images/tail_right.png">
    <img id="tail l" alt="tail l" class="img" src="../images/tail_left.png">
    <img id="tail u" alt="tail u" class="img" src="../images/tail_up.png">
    <img id="tail d" alt="tail d" class="img" src="../images/tail_down.png">

    <img id="body h" alt="body h" class="img" src="../images/body_horizontal.png">
    <img id="body v" alt="body v" class="img" src="../images/body_vertical.png">

    <img id="body tl" alt="body tl" class="img" src="../images/body_topleft.png">
    <img id="body tr" alt="body tr" class="img" src="../images/body_topright.png">
    <img id="body bl" alt="body bl" class="img" src="../images/body_bottomleft.png">
    <img id="body br" alt="body br" class="img" src="../images/body_bottomright.png">
</body>
</html>
